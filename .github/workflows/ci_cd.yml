on:
  push:
    branches:
      - "main"
      - "dev"
      - "deploy"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: "22"
          script: |
            cd ~/back/
            git pull
            cd ../
            docker compose down
            docker compose up -d --build
            sleep 10
            docker compose ps
