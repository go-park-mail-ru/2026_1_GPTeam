services:
  db:
    image: postgres:17
    container_name: gpteam-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gpteam-network

  redis:
    image: redis:latest
    container_name: gpteam-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - gpteam-network

  migrations:
    image: ghcr.io/jackc/tern:latest
    container_name: gpteam-db-migrations
    network_mode: host
    volumes:
      - ./db/migrations:/migrations
    working_dir: /migrations
    command: migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=localhost
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

  auth:
    build: .
    container_name: gpteam-auth
    command: ["./auth-service"]
    restart: always
    depends_on:
      migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=localhost
      - POSTGRES_PORT=5432
      - AUTH_GRPC_LISTEN=:50051
    network_mode: host

  ai:
    build: .
    container_name: gpteam-ai
    command: ["./ai-service"]
    restart: always
    depends_on:
      migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - AI_GRPC_LISTEN=:50052
    network_mode: host

  app:
    build: .
    container_name: gpteam-server
    restart: always
    depends_on:
      migrations:
        condition: service_completed_successfully
      auth:
        condition: service_started
      ai:
        condition: service_started
    network_mode: host
    volumes:
      - ./static:/app/static
      - ./logs:/app/log
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=localhost
      - POSTGRES_PORT=5432
      - REDIS_HOST=localhost
      - REDIS_PORT=6379
      - AUTH_GRPC_ADDR=localhost:50051
      - AI_GRPC_ADDR=localhost:50052

volumes:
  postgres_data:
  redis-data:

networks:
  gpteam-network:
    driver: bridge
