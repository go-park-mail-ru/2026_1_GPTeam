services:
  db:
    image: postgres:17
    container_name: gpteam-db-new
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-name}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-name}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    image: ghcr.io/jackc/tern:latest
    container_name: gpteam-migrations
    volumes:
      - ./db/migrations:/migrations
    working_dir: /migrations
    command: migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ВАЖНО: Внутри сети docker хост базы — это имя сервиса "db"
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-name}
