services:
  db:
    image: postgres:17
    container_name: gpteam-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 5
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gpteam-network

  redis:
    image: redis:latest
    container_name: gpteam-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - gpteam-network

  migrations:
    image: ghcr.io/jackc/tern:latest
    container_name: gpteam-db-migrations
    volumes:
      - ./db/migrations:/migrations
    working_dir: /migrations
    command: migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - gpteam-network

  auth:
    build: .
    container_name: gpteam-auth
    command: ["./auth-service"]
    restart: always
    depends_on:
      migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - AUTH_GRPC_LISTEN=:50051
    expose:
      - "50051"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 50051"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - gpteam-network

  ai:
    build: .
    container_name: gpteam-ai
    command: ["./ai-service"]
    restart: always
    depends_on:
      migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - AI_GRPC_LISTEN=:50052
    expose:
      - "50052"
    # healthcheck не сработал, поэтому отключила
    # healthcheck:
    #   test: ["CMD-SHELL", "nc -z 127.0.0.1 50052"]
    #   interval: 10s
    #   timeout: 3s
    #   retries: 5
    #   start_period: 5s
    networks:
      - gpteam-network

  fileserver:
    build: .
    container_name: gpteam-fileserver
    command: ["./fileserver"]
    restart: always
    env_file:
      - .env
    environment:
      - FILESERVER_HTTP_LISTEN=:8082
      - FILESERVER_GRPC_LISTEN=:50053
      - FILESERVER_STORAGE_PATH=/app/static
    volumes:
      - fileserver_static:/app/static
    expose:
      - "8082"
      - "50053"
    ports:
      - "8083:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/healthz && nc -z 127.0.0.1 50053"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - gpteam-network

  app:
    build: .
    container_name: gpteam-server
    restart: always
    depends_on:
      migrations:
        condition: service_completed_successfully
      auth:
        condition: service_healthy
      ai:
        # service_started, потому что у ai пока нет healthcheck — см. блок ai выше
        condition: service_started
      fileserver:
        condition: service_healthy
    read_only: true
    security_opt:
      - no-new-privileges:true
    expose:
     - "8080"
    volumes:
      - ./logs:/app/log
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUTH_GRPC_ADDR=auth:50051
      - AI_GRPC_ADDR=ai:50052
      - FILESERVER_GRPC_ADDR=fileserver:50053
      - FILESERVER_PUBLIC_BASE=${FILESERVER_PUBLIC_BASE:-http://localhost:8083}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - gpteam-network

volumes:
  postgres_data:
  redis-data:
  fileserver_static:

networks:
  gpteam-network:
    driver: bridge
